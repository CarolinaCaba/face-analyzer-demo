<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FaceAnalyzer · Tu tipo de rostro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">
    <header>
        <h1>✨ FaceAnalyzer ✨</h1>
        <p>Descubre tu tipo de rostro con inteligencia artificial</p>
    </header>

    <div class="main-content">
        <div class="camera-panel">
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="overlayCanvas"></canvas>
            </div>
            <div id="faceStatus" class="face-status">
                <i class="fas fa-spinner fa-pulse"></i> Cargando modelos...
            </div>
            <div class="controls">
                <button id="btnStart" class="btn-primary">
                    <i class="fas fa-camera"></i> Activar cámara
                </button>
                <button id="btnAnalyze" class="btn-secondary" disabled>
                    <i class="fas fa-chart-line"></i> Analizar mi rostro
                </button>
            </div>
            <div class="loading" id="loading" style="display: none;">
                <i class="fas fa-spinner fa-pulse"></i> Analizando...
            </div>
        </div>

        <div class="results-panel">
            <h2>Tu tipo de rostro</h2>
            <div class="result-card">
                <div class="result-icon" id="resultIcon">✨</div>
                <div class="result-name" id="resultName">--</div>
                <div class="result-description" id="resultDescription">
                    Activa la cámara y presiona "Analizar"
                </div>
            </div>
            <div class="metrics">
                <div class="metric">
                    <span>Proporción ancho/alto</span>
                    <strong id="ratioVal">--</strong>
                </div>
                <div class="metric">
                    <span>Ángulo mandíbula</span>
                    <strong id="angleVal">--</strong>
                </div>
                <div class="metric">
                    <span>Tipo sugerido</span>
                    <strong id="cheekVal">--</strong>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Face-api.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script src="script.js"></script>
</body>
</html>
